services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      - POSTGRES_DB=zev
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - zev-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    env_file:
      - .env
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_PORT: 9000
      KC_HEALTH_ENABLED: true
      # start-dev leitet Schema/Host/Port aus dem Request ab -> iss = der Host:Port, den der
      # Browser verwendet (funktioniert für direkten Zugriff auf :9000, lokal wie NAS).
      # NUR hinter einem (HTTPS-)Reverse-Proxy zusätzlich nötig (dann als VOLLE URL inkl. Schema):
      #   KC_HOSTNAME: https://nasnafam.synology.me
      #   KC_PROXY_HEADERS: xforwarded
      # Wird als ${ZEV_FRONTEND_URL} in zev-realm.json (redirectUris/webOrigins) eingesetzt.
      ZEV_FRONTEND_URL: ${ZEV_FRONTEND_URL:-http://localhost:4200}
      # Datenbank-Verbindung
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/zev
      KC_DB_SCHEMA: keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - start-dev
      - --import-realm
      - --features=organization
    ports:
      - "9000:9000"
    depends_on:
      - postgres
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/health/ready" ]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - zev-network

  backend-service:
    build: ./backend-service
    container_name: backend-service
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      - TZ=Europe/Zurich
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/zev
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      # iss-Claim muss dem Host entsprechen, über den der BROWSER Keycloak erreicht.
      # Für NAS: BACKEND_JWT_ISSUER_URI in .env.mqtt auf http://nasnafam.synology.me:9000/realms/zev setzen
      # (gleicher Variablenname wie der Platzhalter in application.yml).
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=${BACKEND_JWT_ISSUER_URI:-http://localhost:9000/realms/zev}
      # JWK-Set wird serverseitig geladen -> interner Docker-Name bleibt korrekt.
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:9000/realms/zev/protocol/openid-connect/certs
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Basic Auth fuer /actuator/** (SBA-Details); Default nur fuer lokale Entwicklung
      - ACTUATOR_USER=${ACTUATOR_USER:-actuator}
      - ACTUATOR_PASSWORD=${ACTUATOR_PASSWORD:-actuator}
      # Basic Auth fuer die Registrierung am SBA-Server (SBA-UI-Credentials)
      - SBA_USER=${SBA_USER:-sba}
      - SBA_PASSWORD=${SBA_PASSWORD:-sba}
    depends_on:
      postgres:
        condition: service_healthy
      admin-service:
        condition: service_started
    networks:
      - zev-network
    restart: unless-stopped

  admin-service:
    build: ./admin-service
    container_name: admin-service
    ports:
      - "8081:8081"
    environment:
      # Basic Auth fuer /actuator/**; muss in allen Services identisch sein,
      # damit der SBA-Server die Client-Endpoints abrufen kann
      - ACTUATOR_USER=${ACTUATOR_USER:-actuator}
      - ACTUATOR_PASSWORD=${ACTUATOR_PASSWORD:-actuator}
      # Basic Auth fuer die SBA-UI und die Client-Registrierung (POST /instances)
      - SBA_USER=${SBA_USER:-sba}
      - SBA_PASSWORD=${SBA_PASSWORD:-sba}
    networks:
      - zev-network
    restart: unless-stopped

  frontend-service:
    build: ./frontend-service
    container_name: frontend-service
    ports:
      - "4200:8080"
    environment:
      # Laufzeit-Config des Angular-Frontends (überschreibt /assets/config.json via
      # FrontendConfigController). Defaults localhost; für NAS in .env.mqtt setzen.
      - FRONTEND_API_BASE_URL=${FRONTEND_API_BASE_URL:-http://localhost:8090}
      - FRONTEND_KEYCLOAK_URL=${FRONTEND_KEYCLOAK_URL:-http://localhost:9000}
      - FRONTEND_KEYCLOAK_REALM=${FRONTEND_KEYCLOAK_REALM:-zev}
      - FRONTEND_KEYCLOAK_CLIENT_ID=${FRONTEND_KEYCLOAK_CLIENT_ID:-zev-frontend}
      # Basic Auth fuer /actuator/** (SBA-Details); Default nur fuer lokale Entwicklung
      - ACTUATOR_USER=${ACTUATOR_USER:-actuator}
      - ACTUATOR_PASSWORD=${ACTUATOR_PASSWORD:-actuator}
      # Basic Auth fuer die Registrierung am SBA-Server (SBA-UI-Credentials)
      - SBA_USER=${SBA_USER:-sba}
      - SBA_PASSWORD=${SBA_PASSWORD:-sba}
    depends_on:
      - backend-service
      - admin-service
    networks:
      - zev-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - zev-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - zev-network
    restart: unless-stopped

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
networks:
  zev-network:
    driver: bridge
