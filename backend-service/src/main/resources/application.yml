server:
  port: 8090

# Application-specific configuration
app:
  cors:
    # Comma-separated list of allowed browser origins for the REST API (/api/**).
    # Override in production via env var APP_CORS_ALLOWED_ORIGINS (e.g. https://zev.example.ch).
    allowed-origins: "http://localhost:4200,http://prometheus:9090,http://localhost:8081"

spring:
  jackson:
    use-jackson2-defaults: true
  application:
    name: backend-service
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-haiku-4-5-20251001
          max-tokens: 100
          temperature: 0.0
          # Prompt Caching with AnthropicCacheStrategy.SYSTEM_AND_TOOLS requires Spring AI 1.1.0+
          # Token usage is logged in EinheitMatchingService
  boot:
    admin:
      client:
        url: ${ADMIN_URL:http://admin-service:8081}
        instance:
          prefer-ip: true
          service-url: http://backend-service:8090
          metadata:
            # Basic-Auth-Zugangsdaten, mit denen der SBA-Server die geschuetzten
            # Actuator-Endpoints dieses Service abruft (Details: Environment, Logger, ...).
            user.name: ${ACTUATOR_USER:actuator}
            user.password: ${ACTUATOR_PASSWORD:actuator}
  datasource:
    url: jdbc:postgresql://localhost:5432/zev
    username: postgres
    password: postgres
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: zev
    show-sql: false
  
  flyway:
    schemas: zev
    create-schemas: true
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${BACKEND_JWT_ISSUER_URI:http://localhost:9000/realms/zev}
          # Optionale Audience-Validierung des aud-Claims (Spring-Boot-nativ, A07).
          # Leer/auskommentiert = aus (nur Issuer-/Timestamp-Pruefung). Zum Aktivieren
          # den erwarteten Wert (z.B. Keycloak-Client/Resource) eintragen:
          # audiences:
          #  - zev-frontend

# Basic-Auth-Zugangsdaten fuer /actuator/** (SecurityConfig.actuatorFilterChain).
# Defaults nur fuer lokale Entwicklung – in Produktion via Env ueberschreiben.
actuator:
  user: ${ACTUATOR_USER:actuator}
  password: ${ACTUATOR_PASSWORD:actuator}

management:
  endpoints:
    web:
      # Security: alle Endpoints exponiert, aber /actuator/** ist per Basic Auth
      # geschuetzt (SecurityConfig.actuatorFilterChain). Nur health/info/prometheus
      # bleiben oeffentlich (Docker-Healthchecks, Prometheus-Scrape).
      exposure:
        include: "*"
      cors:
        allowed-origins: "http://localhost:8081,http://admin-service:8081"
        allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  endpoint:
    health:
      show-details: when_authorized
    env:
      show-values: when_authorized
    configprops:
      show-values: when_authorized
  prometheus:
    metrics:
      export:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    ch.nacht: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: INFO
  
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  
  file:
    name: logs/zev-application.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

# Note: Invoice configuration (zahlungsfrist, IBAN, steller) is now managed
# in the database via /api/einstellungen. Tariffs are managed via /api/tarife.
