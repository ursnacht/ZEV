# Mosquitto-Konfiguration NUR für lokale Entwicklung/Simulation.
# Auth aktiviert (Username/Passwort aus passwd). NICHT für Produktion verwenden
# (dort zusätzlich getrennte User pro Publisher/Subscriber, ACL + TLS,
# siehe docs/Netzwerk-Topologie-Hene.md).
listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/config/passwd

# Keine "New connection"/"disconnected"-Logeinträge (z.B. vom 60s-Healthcheck).
connection_messages false
