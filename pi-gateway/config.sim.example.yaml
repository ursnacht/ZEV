# Beispiel-Konfiguration für den PUBLISHER-SIMULATOR (protokoll: sim).
# Erzeugt synthetische, monoton steigende Zählerstände statt Modbus/gPlug zu lesen –
# zum End-to-End-Test des MQTT-Workflows ohne Hardware/Pi.
#
# Nutzung:  python -m gateway.main --config config.sim.yaml
# (siehe README, Abschnitt "Publisher-Simulator")

org_id: 2                        # muss zum org_id der Einheiten im Backend passen
publish_interval: 30s            # beschleunigt (statt 5m), damit man schnell Daten sieht

broker:
  url: tcp://localhost:1883      # lokaler Mosquitto (docker compose / docker run, siehe README)
  username: ${MQTT_USERNAME}     # Dev-Broker erzwingt Auth -> vor dem Start setzen:
  password: ${MQTT_PASSWORD}     #   export MQTT_USERNAME=zev-backend MQTT_PASSWORD=zev-mqtt-dev
  qos: 1
  client_id: zev-pi-gateway-sim

# messpunkt MUSS je Einheit im Backend existieren (sonst verwirft der Ingest "unbekannter Messpunkt").
# "producer" im Namen        -> Einspeisung überwiegt (negatives total)
# "bilanz" im Namen          -> Bilanzzähler Netzanschluss: BEIDE Register wachsen. Im Backend
#                               BEIDE Einheiten (Typ Bezug + Typ Rücklieferung) mit diesem
#                               messpunkt anlegen -> der Ingest splittet die Meldung je Typ.
# "bezug" im Namen           -> nur Bezug wächst (positives total; Einzel-Zähler je Richtung)
# "rücklieferung" im Namen   -> nur Einspeisung wächst (negatives total; Einzel-Zähler je Richtung)
# sonst                      -> Consumer (positives total)
zaehler:
  - { messpunkt: "MP-Wohnung-1",   protokoll: sim }
  - { messpunkt: "MP-Wohnung-2",   protokoll: sim }
  - { messpunkt: "MP-Producer",    protokoll: sim }
  - { messpunkt: "Bilanz",         protokoll: sim }
