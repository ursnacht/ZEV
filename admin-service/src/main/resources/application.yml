server:
  port: 8081

spring:
  application:
    name: admin-service
  boot:
    admin:
      client:
        url: http://admin-service:8081
        instance:
          prefer-ip: true

management:
  endpoints:
    web:
      # Security: nur unkritische Endpoints exponieren (siehe backend-service).
      exposure:
        include: "health,info,prometheus"
      cors:
        allowed-origins: "http://localhost:8081,http://admin-service:8081"
        allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    de.codecentric.boot.admin: INFO
