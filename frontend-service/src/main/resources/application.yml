server:
  port: 8080

spring:
  application:
    name: frontend-service

# Laufzeit-Konfiguration des Angular-Frontends (wird als /assets/config.json ausgeliefert,
# siehe FrontendConfigController). Über Environment-Variablen überschreibbar – so kann dasselbe
# Image ohne Rebuild in jeder Umgebung (lokal, NAS, ...) betrieben werden.
frontend:
  config:
    api-base-url: ${FRONTEND_API_BASE_URL:http://localhost:8090}
    keycloak:
      url: ${FRONTEND_KEYCLOAK_URL:http://localhost:9000}
      realm: ${FRONTEND_KEYCLOAK_REALM:zev}
      client-id: ${FRONTEND_KEYCLOAK_CLIENT_ID:zev-frontend}
  boot:
    admin:
      client:
        url: http://admin-service:8081
        instance:
          prefer-ip: true
          service-url: http://frontend-service:8080

management:
  endpoints:
    web:
      exposure:
        include: "*"
      cors:
        allowed-origins: "http://localhost:8081,http://admin-service:8081"
        allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
  endpoint:
    health:
      show-details: ALWAYS
    env:
      show-values: ALWAYS
    configprops:
      show-values: ALWAYS
    loggers:
      enabled: true
